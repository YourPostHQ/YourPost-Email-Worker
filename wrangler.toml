name = "yourpost-email-worker" # Name of the worker
main = "email-worker.js"
type = "javascript-email"
compatibility_date = "2024-01-01"

# Service API endpoint — used by this worker for inbound email delivery
# This goes through the Next.js app on port 443, which proxies to port 9001
[vars]
YOURPOST_SERVICE_URL = "https://yourpost.app"

# Use secrets for sensitive values (recommended):
# wrangler secret put YOURPOST_SERVICE_TOKEN

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1