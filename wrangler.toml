name = "yourpost"
main = "email-worker.js"
type = "javascript-email"
compatibility_date = "2024-01-01"

# Service API endpoint (port 9001) — used by this worker for inbound email delivery
[vars]
YOURPOST_SERVICE_URL = "http://yourpost.yourdomain.com:9001"

# Use secrets for sensitive values (recommended):
# wrangler secret put YOURPOST_SERVICE_URL
# wrangler secret put YOURPOST_SERVICE_TOKEN

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1